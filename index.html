<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

.hub{
  font-family:'Fredoka One','微軟正黑體','Microsoft JhengHei',sans-serif;
  padding:32px 16px 48px;
  background:linear-gradient(160deg,#fff5fb 0%,#f8f0ff 100%);
  min-height:100%;
  position:relative;
  overflow:hidden;
}

.hub::before{
  content:'🎈  🎪  🎈  🎊  🎈  🎪  🎈';
  position:absolute; top:-10px; left:0; right:0;
  font-size:28px; letter-spacing:40px;
  opacity:.06; pointer-events:none;
  white-space:nowrap; overflow:hidden;
}

.hub-title{
  font-family:'Fredoka One','微軟正黑體','Microsoft JhengHei',sans-serif;
  font-size:clamp(22px,5vw,38px);
  text-align:center; margin-bottom:6px;
  background:linear-gradient(135deg,#ff85a1,#ff6b9d,#c77dff,#9b5de5);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 2px 8px rgba(232,111,154,.2));
}
.hub-sub{
  text-align:center; font-size:13px;
  color:#9b7a8a; font-weight:700;
  font-family:'微軟正黑體','Microsoft JhengHei',sans-serif;
  letter-spacing:.15em; margin-bottom:32px;
}

.games{
  display:flex; gap:20px; justify-content:center;
  flex-wrap:wrap; max-width:700px; margin:0 auto;
}

.game-card{
  background:#fff;
  border-radius:28px;
  box-shadow:0 8px 32px rgba(232,111,154,.15), 0 2px 8px rgba(232,111,154,.08);
  border:2px solid rgba(255,182,215,.3);
  padding:28px 24px;
  width:min(300px,90vw);
  display:flex; flex-direction:column; align-items:center; gap:14px;
  text-align:center;
  transition:transform .2s, box-shadow .2s;
  cursor:pointer;
  text-decoration:none;
  position:relative;
  overflow:hidden;
}
.game-card:hover{ transform:translateY(-6px); }
.game-card:active{ transform:translateY(-2px) scale(.98); }

.card-rhythm{ background:linear-gradient(160deg,#fff5fb,#fff0f6); }
.card-rhythm:hover{
  box-shadow:0 16px 48px rgba(232,111,154,.3), 0 4px 16px rgba(232,111,154,.15);
  border-color:rgba(255,133,161,.5);
}
.card-tetris{ background:linear-gradient(160deg,#f8f0ff,#f0fff8); }
.card-tetris:hover{
  box-shadow:0 16px 48px rgba(155,93,229,.25), 0 4px 16px rgba(155,93,229,.12);
  border-color:rgba(155,93,229,.4);
}

.game-icon{
  font-size:56px; line-height:1;
  animation:floatIcon 3s ease-in-out infinite;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.1));
}
.card-tetris .game-icon{ animation-delay:.5s; }
@keyframes floatIcon{
  0%,100%{transform:translateY(0) rotate(-3deg)}
  50%{transform:translateY(-8px) rotate(3deg)}
}

.game-name{
  font-family:'Fredoka One','微軟正黑體','Microsoft JhengHei',sans-serif;
  font-size:clamp(18px,4vw,24px); line-height:1.2;
}
.card-rhythm .game-name{
  background:linear-gradient(135deg,#ff85a1,#e86f9a);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.card-tetris .game-name{
  background:linear-gradient(135deg,#9b5de5,#3ecf8e);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}

.game-desc{
  font-size:12px; color:#9b7a8a; font-weight:700;
  font-family:'微軟正黑體','Microsoft JhengHei',sans-serif;
  line-height:1.6; max-width:220px;
}

.game-tags{
  display:flex; gap:6px; flex-wrap:wrap; justify-content:center;
}
.tag{
  font-size:10px; font-weight:800; letter-spacing:.06em;
  font-family:'微軟正黑體','Microsoft JhengHei',sans-serif;
  padding:4px 10px; border-radius:20px;
}
.card-rhythm .tag{ background:rgba(255,133,161,.12); color:#e86f9a; }
.card-tetris .tag{ background:rgba(155,93,229,.1); color:#9b5de5; }

.game-btn{
  display:inline-flex; align-items:center; gap:6px;
  padding:11px 24px; border-radius:50px; border:none;
  font-family:'Fredoka One','微軟正黑體','Microsoft JhengHei',sans-serif;
  font-size:14px; cursor:pointer; letter-spacing:.03em;
  transition:transform .15s, box-shadow .15s;
  pointer-events:none;
}
.card-rhythm .game-btn{
  background:linear-gradient(135deg,#ff85a1,#e86f9a);
  color:#fff; box-shadow:0 4px 16px rgba(232,111,154,.4);
}
.card-tetris .game-btn{
  background:linear-gradient(135deg,#9b5de5,#c77dff);
  color:#fff; box-shadow:0 4px 16px rgba(155,93,229,.4);
}
.game-card:hover .game-btn{ transform:scale(1.05); }

.badge-new{
  position:absolute; top:14px; right:14px;
  background:linear-gradient(135deg,#ffd166,#ffbe0b);
  color:#fff; font-family:'Fredoka One',cursive;
  font-size:11px; padding:3px 10px; border-radius:20px;
  box-shadow:0 2px 8px rgba(255,190,11,.4);
}

.shared-info{
  margin-top:24px; text-align:center;
  display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap;
}
.shared-badge{
  display:inline-flex; align-items:center; gap:5px;
  background:#fff; border:1.5px solid rgba(255,182,215,.4);
  border-radius:20px; padding:6px 14px;
  font-size:11px; color:#9b7a8a; font-weight:800;
  font-family:'微軟正黑體','Microsoft JhengHei',sans-serif;
  box-shadow:0 2px 8px rgba(232,111,154,.08);
}
</style>

<div class="hub">
  <div class="hub-title">🎈 氣球小V魔法派對</div>
  <div class="hub-sub">選擇你想玩的遊戲</div>

  <div class="games">
    <!-- 節奏遊戲：同視窗跳轉 -->
    <a class="game-card card-rhythm"
       href="https://balloonv.com/%e6%b0%a3%e7%90%83%e5%b0%8fv%e9%ad%94%e6%b3%95%e6%b4%be%e5%b0%8d">
      <div class="game-icon">🎵</div>
      <div class="game-name">魔法派對<br>節奏遊戲</div>
      <div class="game-desc">跟著氣球小V的音樂節拍點擊音符！挑戰全球排行榜🎶</div>
      <div class="game-tags">
        <span class="tag">🎹 音樂節奏</span>
        <span class="tag">🏆 排行榜</span>
        <span class="tag">📱 手機/電腦</span>
      </div>
      <div class="game-btn">🎮 開始遊玩</div>
    </a>

    <!-- 俄羅斯方塊：同視窗跳轉 -->
    <a class="game-card card-tetris"
       href="https://balloonv.com/%e6%b0%a3%e7%90%83%e5%b0%8fv-%e6%96%b9%e5%a1%8a%e6%b4%be%e5%b0%8d%e9%81%8a%e6%88%b2">
      <div class="badge-new">✨ NEW</div>
      <div class="game-icon">🎈</div>
      <div class="game-name">氣球小V<br>方塊派對</div>
      <div class="game-desc">用可愛的氣球方塊堆疊你的世界！消除氣球、累積連消🎊</div>
      <div class="game-tags">
        <span class="tag">🎈 氣球方塊</span>
        <span class="tag">🏆 排行榜</span>
        <span class="tag">📱 手機/電腦</span>
      </div>
      <div class="game-btn">🎮 開始遊玩</div>
    </a>
  </div>

  <div class="shared-info">
    <div class="shared-badge">👤 共用玩家設定</div>
    <div class="shared-badge">🏆 各自排行榜</div>
    <div class="shared-badge">🎵 同一套音樂</div>
  </div>
</div>
